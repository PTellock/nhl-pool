
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHL Playoff Pool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#eeede9;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#9a9890;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --blue:#1565C0;--blue-bg:#E3F0FF;
  --green:#2E7D32;--green-bg:#E8F5E9;
  --red:#C62828;--red-bg:#FFEBEE;
  --amber:#B8860B;--amber-bg:#FFF8E1;
  --orange:#E65100;--orange-bg:#FFF3E0;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1c;--bg2:#272724;--bg3:#2e2e2b;
  --text:#f0efea;--text2:#a8a6a0;--text3:#6a6864;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --blue:#90CAF9;--blue-bg:#0D2744;
  --green:#81C784;--green-bg:#1B3E1E;
  --red:#EF9A9A;--red-bg:#3E1A1A;
  --amber:#FFD54F;--amber-bg:#3E3000;
  --orange:#FFB74D;--orange-bg:#3E2200;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.header{background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px;height:52px}
.header-title{font-size:16px;font-weight:500;flex:1}
.header-sub{font-size:12px;color:var(--text3);white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.sync-dot.saving{background:var(--amber)}.sync-dot.saved{background:var(--green)}.sync-dot.error{background:var(--red)}
.role-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;border:0.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg2);white-space:nowrap;transition:all .12s}
.role-badge.admin{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.role-badge.participant{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.app{max-width:960px;margin:0 auto;padding:0 16px 60px}
.tabs{display:flex;gap:2px;padding:16px 0 0;border-bottom:0.5px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:var(--radius) var(--radius) 0 0;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid transparent;border-bottom:none;color:var(--text2);background:transparent;white-space:nowrap;transition:all .12s}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--border);border-bottom-color:var(--bg);margin-bottom:-0.5px}
.tab:hover:not(.active){color:var(--text)}
.section{display:none}.section.active{display:block}
/* Matchup cards */
.round-block{margin-bottom:28px}
.round-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.round-name{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.round-grid{display:grid;gap:8px}
.r1-grid,.r2-grid,.r3-grid{grid-template-columns:repeat(2,1fr)}
.rf-grid{grid-template-columns:1fr;max-width:360px}
@media(max-width:560px){.r1-grid,.r2-grid,.r3-grid{grid-template-columns:1fr}}
.matchup-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.team-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:0.5px solid var(--border);transition:background .1s}
.team-row:last-of-type{border-bottom:none}
.team-row.clickable{cursor:pointer}
.team-row.clickable:hover{background:var(--bg2)}
.team-row.winner{background:var(--green-bg)}
.team-row.winner .team-name{color:var(--green);font-weight:500}
.team-row.loser{opacity:.4}
.seed{font-size:10px;color:var(--text3);min-width:14px;text-align:right}
.team-name{font-size:13px;flex:1}
.dog-tag{font-size:9px;font-weight:500;padding:1px 5px;border-radius:999px;background:var(--orange-bg);color:var(--orange)}
.check{width:15px;height:15px;border-radius:50%;border:0.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check.on{background:var(--green);border-color:var(--green)}
.check.on::after{content:'';display:block;width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.lock-bar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text3)}
.lock-bar.locked{color:var(--red);background:var(--red-bg)}
.lock-bar.open{color:var(--green)}
.lock-icon{font-size:11px}
/* Picks */
.picks-block{border-top:0.5px solid var(--border);padding:10px 10px 8px;background:var(--bg2)}
.pick-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pick-row.mine{background:var(--blue-bg);border-radius:var(--radius);padding:3px 4px;margin:-3px -4px 4px}
.pick-name{font-size:11px;color:var(--text2);min-width:62px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-btn{padding:3px 9px;font-size:11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);transition:all .1s;white-space:nowrap;font-family:inherit}
.pick-btn:hover:not(:disabled){background:var(--bg3)}
.pick-btn.sel{background:var(--blue);border-color:var(--blue);color:#fff}
.pick-btn.correct{background:var(--green);border-color:var(--green);color:#fff}
.pick-btn.wrong{background:var(--red);border-color:var(--red);color:#fff;text-decoration:line-through;opacity:.75}
.pick-btn:disabled{cursor:default;opacity:.6}
.no-pick{font-size:10px;color:var(--text3)}
.missing-tag{font-size:9px;font-weight:500;padding:1px 5px;border-radius:999px;background:var(--orange-bg);color:var(--orange)}
.locked-note{font-size:10px;color:var(--text3)}
/* Standings */
.standings-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:500;color:var(--text3);padding:6px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:8px 8px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
.pts{text-align:center;font-weight:500}
.bar-wrap{height:3px;background:var(--bg3);border-radius:2px;margin-top:3px}
.bar-fill{height:3px;background:var(--blue);border-radius:2px}
/* Cup */
.cup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.cup-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.cup-pname{font-size:13px;font-weight:500;margin-bottom:6px}
.cup-team-btn{padding:3px 8px;font-size:11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);margin:2px;transition:all .1s;font-family:inherit;white-space:nowrap}
.cup-team-btn:hover:not(:disabled){background:var(--bg2)}
.cup-team-btn.sel{background:var(--blue);border-color:var(--blue);color:#fff}
.cup-team-btn.correct{background:var(--green);border-color:var(--green);color:#fff}
.cup-team-btn:disabled{cursor:default;opacity:.6}
/* Setup / Admin */
.setup-section{margin-bottom:28px}
.setup-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:10px}
.setup-matchup{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.setup-matchup-title{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.input-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.input-label{font-size:11px;color:var(--text3);min-width:36px}
input[type=text],input[type=number],input[type=password],input[type=datetime-local]{padding:6px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .12s}
input:focus{border-color:var(--blue)}
input[type=datetime-local]{font-size:12px}
.seed-in{width:48px}
.team-in{flex:1}
.lock-in{flex:1;font-size:12px}
.participant-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{display:flex;align-items:center;gap:4px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 10px;font-size:12px}
.chip-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;padding:0 2px}
.chip-x:hover{color:var(--red)}
.btn{padding:7px 16px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:all .12s;margin-right:6px;margin-bottom:6px}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{opacity:.9}
.btn.danger{color:var(--red);border-color:var(--red)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:4px 10px;font-size:12px;margin-right:4px;margin-bottom:4px}
.info{background:var(--blue-bg);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--text2);margin-bottom:12px}
.warn{background:var(--orange-bg);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--orange);margin-bottom:12px}
.success{background:var(--green-bg);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:12px}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 6px;border-radius:999px}
.badge.complete{background:var(--green-bg);color:var(--green)}
.badge.live{background:var(--blue-bg);color:var(--blue)}
.badge.gold{background:var(--amber-bg);color:var(--amber)}
.badge.locked{background:var(--red-bg);color:var(--red)}
.badge.open{background:var(--green-bg);color:var(--green)}
/* Modals */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border2);padding:24px 28px;width:320px;max-width:92vw}
.modal-title{font-size:15px;font-weight:500;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
/* Metrics */
.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:10px 14px}
.metric-lbl{font-size:11px;color:var(--text3);margin-bottom:2px}
.metric-val{font-size:22px;font-weight:500}
.scoring-note{font-size:11px;color:var(--text3);margin-top:12px}
/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Participant table in setup */
.p-table{width:100%;border-collapse:collapse;font-size:13px}
.p-table th{font-size:11px;font-weight:500;color:var(--text3);padding:6px 10px;border-bottom:0.5px solid var(--border);text-align:left}
.p-table td{padding:8px 10px;border-bottom:0.5px solid var(--border)}
.p-table tr:last-child td{border-bottom:none}
.pin-display{font-family:monospace;font-size:12px;color:var(--text2);background:var(--bg2);padding:2px 6px;border-radius:4px}
</style>
</head>

<div class="header">
  <div class="header-inner">
    <div class="header-title" id="hdr-title">NHL Playoff Pool</div>

    <div class="sync-dot" id="sync-dot" title=""></div>
    <button class="role-badge" id="role-btn" onclick="handleRoleClick()">Sign in</button>
  </div>
</div>

<div class="app" style="padding-top:16px">

    <button class="tab admin-only" onclick="showTab('admin')" style="display:none">Admin</button>

<!-- Sign-in modal -->

    <div style="margin-bottom:10px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Your name (select)</div>
      <select id="login-who" style="width:100%;padding:6px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none">
        <option value="">— select —</option>
        <option value="__admin__">Admin</option>
      </select>
    </div>
    <input type="password" id="pw-input" placeholder="PIN or password" style="width:100%;margin-bottom:8px" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn primary" onclick="tryLogin()" style="width:100%;margin-right:0">Sign in</button>
    <div class="modal-err" id="pw-err"></div>
    <button class="btn" onclick="closeLogin()" style="width:100%;margin-top:6px;margin-right:0">Cancel</button>

</div>

<script>

/* ── Session ── */

/* ── PIN generation: lowercase name, no spaces ── */
function pinFor(name){ return name.toLowerCase().replace(/\s+/g,''); }

async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── Lock logic ── */
function isPickLocked(ri, mi){
  const m = state.rounds[ri].matchups[mi];
  // Admin can always edit
  if(isAdmin) return false;
  // Locked if winner set
  if(m.winner) return true;
  // Locked if lock time has passed
  if(m.lockTime && new Date() >= new Date(m.lockTime)) return true;
  return false;
}

function lockStatus(m){
  if(m.winner) return 'result';
  if(!m.lockTime) return 'open';
  const now = new Date(), lock = new Date(m.lockTime);
  if(now >= lock) return 'locked';
  return 'open';
}

function formatLockTime(iso){
  if(!iso) return null;
  const d = new Date(iso);
  return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function timeUntilLock(iso){
  if(!iso) return null;
  const diff = new Date(iso) - new Date();
  if(diff <= 0) return null;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  if(h > 24) return `${Math.floor(h/24)}d ${h%24}h`;
  if(h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

/* ── JSONBin ── */
function setSyncStatus(s){
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot'+(s!=='idle'?' '+s:'');
  d.title = s==='saving'?'Saving...' : s==='saved'?'Saved' : s==='error'?'Save failed':'';
}

async function loadFromBin(){
  try{
    const res = await fetch(API_BASE+'/latest',{headers:{'X-Access-Key':ACCESS_KEY}});
    if(!res.ok) throw new Error();
    const data = await res.json();
    if(data.record?.participants) state = data.record;
    else await saveToBin();
  }catch(e){ setSyncStatus('error'); }
}

let saveTimer = null;
async function saveToBin(){
  if(!isAdmin) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    setSyncStatus('saving');
    try{
      const res = await fetch(API_BASE,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
        body:JSON.stringify(state)
      });
      if(!res.ok) throw new Error();
      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2500);
    }catch(e){ setSyncStatus('error'); }
  },600);
}

/* ── Auth ── */
function populateLoginSelect(){
  const sel = document.getElementById('login-who');
  while(sel.options.length > 2) sel.remove(2);
  state.participants.forEach(p=>{
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
}

function handleRoleClick(){
  if(isAdmin || currentParticipant){
    isAdmin = false; currentParticipant = null;
    updateRoleBadge(); render();
  } else {
    populateLoginSelect();
    document.getElementById('login-modal').style.display = 'flex';
    setTimeout(()=>document.getElementById('login-who').focus(),50);
  }
}

function closeLogin(){
  document.getElementById('login-modal').style.display = 'none';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-who').value = '';
}

async function tryLogin(){
  const who = document.getElementById('login-who').value;
  const pw  = document.getElementById('pw-input').value.trim();
  if(!who){ document.getElementById('pw-err').textContent = 'Please select your name.'; return; }

  if(who === '__admin__'){
    const h = await sha256(pw);
    if(h === ADMIN_HASH){
      isAdmin = true; currentParticipant = null;
      updateRoleBadge(); closeLogin(); render();
    } else {
      document.getElementById('pw-err').textContent = 'Incorrect password.';
    }
  } else {
    const expected = pinFor(who);
    if(pw === expected){
      isAdmin = false; currentParticipant = who;
      updateRoleBadge(); closeLogin(); render();
    } else {
      document.getElementById('pw-err').textContent = `Incorrect PIN. Hint: your name, lowercase, no spaces.`;
    }
  }
}

function updateRoleBadge(){
  const btn = document.getElementById('role-btn');
  btn.className = 'role-badge';
  if(isAdmin){ btn.textContent = 'Admin'; btn.classList.add('admin'); }
  else if(currentParticipant){ btn.textContent = currentParticipant; btn.classList.add('participant'); }
  else { btn.textContent = 'Sign in'; }
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=isAdmin?'':'none');
}

/* ── Infer next round ── */
/* inferNextRound removed - admin sets matchups manually */

function getAllTeams(){
  const t=new Set();
  state.rounds[0].matchups.forEach(m=>{t.add(m.fav);t.add(m.dog);});
  return [...t].sort();
}

/* ── Scoring ── */
function calcScore(p){
  let total=0; const byRound=[];
  state.rounds.forEach((r,ri)=>{
    let rPts=0;
    r.matchups.forEach((m,mi)=>{
      const pick=(r.picks[p]||[])[mi];
      if(m.winner&&pick&&pick===m.winner)
        rPts+=m.winner===m.fav?SCORING[ri].fav:SCORING[ri].dog;
    });
    byRound.push(rPts); total+=rPts;
  });
  const cw=getCupWinner();
  const cupPts=(cw&&state.cupPicks[p]===cw)?CUP_BONUS:0;
  return{total:total+cupPts,byRound,cupPts};
}

function getCupWinner(){
  const r=state.rounds[3];
  return r.matchups.length>0&&r.matchups[0]?.winner?r.matchups[0].winner:null;
}

/* ── Actions ── */
function toggleWinner(ri,mi,team){
  if(!isAdmin) return;
  const m=state.rounds[ri].matchups[mi];
  m.winner=m.winner===team?null:team;
  saveToBin(); render();
}

function setPick(ri,mi,p,team){
  // Participants can only set their own pick; admin can set any
  if(!isAdmin && currentParticipant!==p) return;
  if(isPickLocked(ri,mi)) return;
  if(!state.rounds[ri].picks[p]) state.rounds[ri].picks[p]=state.rounds[ri].matchups.map(()=>null);
  const cur=state.rounds[ri].picks[p][mi];
  state.rounds[ri].picks[p][mi]=cur===team?null:team;
  if(!isAdmin){
    // Participant saves don't use admin key - use access key PUT workaround
    saveParticipantPick();
  } else {
    saveToBin();
  }
  render();
}

// Participants can save their own picks using master key too (file is shared, picks are open data)
async function saveParticipantPick(){
  setSyncStatus('saving');
  try{
    const res=await fetch(API_BASE,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
      body:JSON.stringify(state)
    });
    if(!res.ok) throw new Error();
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),2500);
  }catch(e){ setSyncStatus('error'); }
}

function setCupPick(p,team){
  if(!isAdmin && currentParticipant!==p) return;
  if(getCupWinner()) return;
  // Cup picks lock at first puck drop - use earliest R1 lockTime as proxy, or just allow until winner set
  state.cupPicks[p]=state.cupPicks[p]===team?null:team;
  if(isAdmin) saveToBin(); else saveParticipantPick();
  renderCup(); renderStandings();
}

function setCupWinner(team){
  if(!isAdmin) return;
  const r=state.rounds[3];
  if(r.matchups.length>0&&r.matchups[0]) r.matchups[0].winner=r.matchups[0].winner===team?null:team;
  saveToBin(); render();
}

/* ── Render bracket ── */
function renderBracket(){
  const gridClass=['r1-grid','r2-grid','r3-grid','rf-grid'];
  let html='';
  for(let ri=0;ri<4;ri++){
    const r=state.rounds[ri];
    if(ri>0&&r.matchups.length===0) continue;
    const allWon=r.matchups.length>0&&r.matchups.every(m=>m.winner);
    const anyWon=r.matchups.some(m=>m.winner);
    html+=`<div class="round-block"><div class="round-header"><span class="round-name">${ROUNDS[ri]}</span>`;
    if(allWon) html+=`<span class="badge complete">complete</span>`;
    else if(anyWon) html+=`<span class="badge live">in progress</span>`;
    html+=`</div><div class="round-grid ${gridClass[ri]}">`;
    if(r.matchups.length===0){
      html+=`<div style="color:var(--text3);font-size:12px;padding:8px;grid-column:1/-1">Matchups appear automatically once all previous results are entered.</div>`;
    }
    r.matchups.forEach((m,mi)=>{
      const favW=m.winner===m.fav, dogW=m.winner===m.dog;
      const status=lockStatus(m);
      const until=timeUntilLock(m.lockTime);
      const esc=s=>(s||'').replace(/'/g,"\\'");
      html+=`<div class="matchup-card">`;
      // Lock bar
      if(status==='locked'||status==='result'){
        html+=`<div class="lock-bar locked"><span class="lock-icon">&#128274;</span> ${status==='result'?'Series complete':'Picks locked'}</div>`;
      } else if(m.lockTime){
        html+=`<div class="lock-bar open"><span class="lock-icon">&#128275;</span> Locks ${formatLockTime(m.lockTime)}${until?' ('+until+')':''}</div>`;
      }
      // Teams
      html+=`<div class="team-row${favW?' winner':m.winner&&!favW?' loser':''}${isAdmin?' clickable':''}" onclick="toggleWinner(${ri},${mi},'${esc(m.fav)}')">`;
      html+=`<span class="seed">${m.favSeed}</span><span class="team-name">${m.fav}</span><div class="check${favW?' on':''}"></div></div>`;
      html+=`<div class="team-row${dogW?' winner':m.winner&&!dogW?' loser':''}${isAdmin?' clickable':''}" onclick="toggleWinner(${ri},${mi},'${esc(m.dog)}')">`;
      html+=`<span class="seed">${m.dogSeed}</span><span class="team-name">${m.dog}</span><span class="dog-tag">dog</span><div class="check${dogW?' on':''}"></div></div>`;
      // Picks
      html+=`<div class="picks-block">`;
      state.participants.forEach(p=>{
        const picks=r.picks[p]||[];
        const pick=picks[mi];
        const correct=m.winner&&pick&&pick===m.winner;
        const wrong=m.winner&&pick&&pick!==m.winner;
        const isMine=(currentParticipant===p||isAdmin);
        const canEdit=isMine&&!isPickLocked(ri,mi);
        const btnCls=team=>pick===team?(correct?'correct':wrong?'wrong':'sel'):'';
        const isMyRow=currentParticipant===p;
        html+=`<div class="pick-row${isMyRow?' mine':''}"><span class="pick-name" title="${p}">${p}</span>`;
        html+=`<button class="pick-btn ${btnCls(m.fav)}" onclick="setPick(${ri},${mi},'${esc(p)}','${esc(m.fav)}')" ${!canEdit?'disabled':''}>${m.fav}</button>`;
        html+=`<button class="pick-btn ${btnCls(m.dog)}" onclick="setPick(${ri},${mi},'${esc(p)}','${esc(m.dog)}')" ${!canEdit?'disabled':''}>${m.dog}</button>`;
        if(!pick && isAdmin && status!=='result') html+=`<span class="missing-tag">no pick</span>`;
        else if(!pick && (status==='locked'||status==='result')) html+=`<span class="no-pick">—</span>`;
        else if(!pick && isMyRow && canEdit) html+=`<span class="no-pick" style="color:var(--orange)">pick!</span>`;
        html+=`</div>`;
      });
      if(!isAdmin&&!currentParticipant){
        html+=`<div style="font-size:11px;color:var(--text3);margin-top:4px">Sign in to edit your pick</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById('bracket').innerHTML=html;
  updateHeader();
}

/* ── Render standings ── */
function getEliminatedTeams(){
  const elim=new Set();
  state.rounds.forEach(r=>{
    r.matchups.forEach(m=>{
      if(m.winner){
        if(m.winner!==m.fav) elim.add(m.fav);
        if(m.winner!==m.dog) elim.add(m.dog);
      }
    });
  });
  return elim;
}

function calcDetailedScore(p){
  const SERIES_PER_ROUND=[8,4,2,1];
  let favPts=0,dogPts=0,potential=0;
  const byRound=[];
  const cw=getCupWinner();
  const cp=state.cupPicks[p];
  const elim=getEliminatedTeams();

  state.rounds.forEach((r,ri)=>{
    let rFav=0,rDog=0,rPot=0;
    const numSeries=SERIES_PER_ROUND[ri];

    // Score settled matchups and count potential for open ones
    for(let mi=0;mi<numSeries;mi++){
      const m=r.matchups[mi];
      if(!m) {
        // Future round series not yet set up — assume max (upset) points
        rPot+=SCORING[ri].dog;
        continue;
      }
      const pick=(r.picks[p]||[])[mi];
      if(m.winner){
        // Result is in — only score if pick matched
        if(pick&&pick===m.winner){
          const pts=m.winner===m.fav?SCORING[ri].fav:SCORING[ri].dog;
          if(m.winner===m.fav) rFav+=pts; else rDog+=pts;
        }
        // no potential — series is done
      } else {
        // No result yet
        if(pick){
          // Pick made — use that pick's point value as potential
          rPot+=pick===m.fav?SCORING[ri].fav:SCORING[ri].dog;
        } else {
          // No pick — assume upset (max possible)
          rPot+=SCORING[ri].dog;
        }
      }
    }

    byRound.push({fav:rFav,dog:rDog,pot:rPot});
    favPts+=rFav; dogPts+=rDog; potential+=rPot;
  });

  // Cup scoring and potential
  const cupPts=(cw&&cp===cw)?CUP_BONUS:0;
  const cupAlive=cp&&!cw&&!elim.has(cp);
  const cupPot=cupAlive?CUP_BONUS:0;

  return{favPts,dogPts,cupPts,potential,cupPot,byRound,total:favPts+dogPts+cupPts};
}

function renderStandings(){
  const scored=state.participants.map(p=>({name:p,...calcDetailedScore(p)})).sort((a,b)=>b.total-a.total);
  const maxPts=Math.max(...scored.map(s=>s.total+s.potential+s.cupPot),1);
  const cw=getCupWinner();
  const elim=getEliminatedTeams();
  const activeRounds=state.rounds.filter(r=>r.matchups.length>0);

  let html=`<div class="metric-row">`;
  html+=`<div class="metric"><div class="metric-lbl">Participants</div><div class="metric-val">${state.participants.length}</div></div>`;
  html+=`<div class="metric"><div class="metric-lbl">Leader</div><div class="metric-val" style="font-size:16px">${scored[0]?.name||'—'}</div></div>`;
  html+=`<div class="metric"><div class="metric-lbl">Leader pts</div><div class="metric-val" style="color:var(--amber)">${scored[0]?.total||0}</div></div>`;
  if(cw) html+=`<div class="metric"><div class="metric-lbl">Champion</div><div class="metric-val" style="font-size:15px">${cw}</div></div>`;
  html+=`</div>`;

  // Standings table
  html+=`<div class="standings-wrap" style="margin-bottom:28px"><table><thead><tr><th>#</th><th>Participant</th><th>Cup pick</th>`;
  activeRounds.forEach(r=>{const ri=state.rounds.indexOf(r);html+=`<th style="text-align:center">R${ri+1}</th>`;});
  html+=`<th style="text-align:center">Cup</th><th style="text-align:center">Total</th></tr></thead><tbody>`;
  scored.forEach((p,i)=>{
    const cp=state.cupPicks[p.name]||null;
    const cpWon=cw&&cp===cw;
    const cpElim=cp&&elim.has(cp);
    const cpAlive=cp&&!cw&&!cpElim;
    const isMe=p.name===currentParticipant;
    html+=`<tr${isMe?' style="background:var(--blue-bg)"':''}>`;
    html+=`<td style="font-size:11px;color:var(--text3)">${i+1}</td>`;
    html+=`<td style="font-weight:500">${p.name}</td>`;
    // Cup pick with status
    let cpDisplay='—';
    if(cp){
      if(cpWon) cpDisplay=`<span style="color:var(--amber);font-weight:500">&#127942; ${cp}</span>`;
      else if(cpElim) cpDisplay=`<span style="color:var(--red);text-decoration:line-through;opacity:.6">${cp}</span>`;
      else if(cpAlive) cpDisplay=`<span style="color:var(--green);font-weight:500">&#10003; ${cp}</span>`;
      else cpDisplay=`<span style="color:var(--text2)">${cp}</span>`;
    }
    html+=`<td style="font-size:12px">${cpDisplay}</td>`;
    activeRounds.forEach(r=>{
      const ri=state.rounds.indexOf(r);
      const rd=p.byRound[ri]||{fav:0,dog:0,pot:0};
      html+=`<td class="pts">${rd.fav+rd.dog}</td>`;
    });
    html+=`<td class="pts">${p.cupPts>0?'+'+p.cupPts:'—'}</td>`;
    // Total with potential
    const pot=p.potential+p.cupPot;
    html+=`<td class="pts">${p.total}${pot>0?` <span style="font-size:10px;color:var(--text3)">+${pot}?</span>`:''}`;
    html+=`<div class="bar-wrap">`;
    html+=`<div style="display:flex;height:3px;border-radius:2px;overflow:hidden">`;
    const favW=Math.round(p.favPts/maxPts*100);
    const dogW=Math.round(p.dogPts/maxPts*100);
    const cupW=Math.round(p.cupPts/maxPts*100);
    const potW=Math.round(pot/maxPts*100);
    if(favW>0) html+=`<div style="width:${favW}%;background:#1565C0"></div>`;
    if(dogW>0) html+=`<div style="width:${dogW}%;background:#2E7D32"></div>`;
    if(cupW>0) html+=`<div style="width:${cupW}%;background:#B8860B"></div>`;
    if(potW>0) html+=`<div style="width:${potW}%;background:var(--border2)"></div>`;
    html+=`</div></div></td></tr>`;
  });
  html+=`</tbody></table></div>`;

  // Legend
  html+=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:20px">`;
  html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#1565C0;display:inline-block"></span>Favorite pts</span>`;
  html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#2E7D32;display:inline-block"></span>Upset pts</span>`;
  html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#B8860B;display:inline-block"></span>Cup pts</span>`;
  html+=`<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--border2);display:inline-block"></span>Potential pts</span>`;
  html+=`<span style="margin-left:8px">Cup: &#127942;=won &nbsp; <span style="color:var(--green)">&#10003;</span>=still alive &nbsp; <span style="color:var(--red);text-decoration:line-through">team</span>=eliminated</span>`;
  html+=`</div>`;

  // Charts
  html+=`<div style="margin-bottom:28px">`;
  html+=`<div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px">Points breakdown</div>`;
  html+=`<div style="position:relative;width:100%;height:${Math.max(scored.length*40+60,200)}px"><canvas id="bar-chart" role="img" aria-label="Stacked bar chart showing points breakdown per participant"></canvas></div>`;
  html+=`</div>`;
  html+=`<div style="margin-bottom:28px">`;
  html+=`<div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:12px">Cumulative points by round</div>`;
  html+=`<div style="position:relative;width:100%;height:300px"><canvas id="line-chart" role="img" aria-label="Line chart showing cumulative points after each round"></canvas></div>`;
  html+=`</div>`;
  html+=`<div class="scoring-note">Scoring: R1 dog=3/fav=1 · R2 dog=2/fav=1 · R3+Final=1 each · Cup correct pick = +${CUP_BONUS} pts</div>`;

  document.getElementById('standings').innerHTML=html;

  // Render charts after DOM update
  setTimeout(()=>renderCharts(scored,activeRounds),50);
}

function renderCharts(scored,activeRounds){
  if(typeof Chart==='undefined') return;

  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const textColor=isDark?'#a8a6a0':'#5f5e5a';
  const gridColor=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.07)';

  // Stacked horizontal bar chart
  const barCtx=document.getElementById('bar-chart');
  if(barCtx){
    const labels=scored.map(s=>s.name);
    const favData=scored.map(s=>s.favPts);
    const dogData=scored.map(s=>s.dogPts);
    const cupData=scored.map(s=>s.cupPts);
    const potData=scored.map(s=>s.potential+s.cupPot);
    new Chart(barCtx,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {label:'Favorite pts',data:favData,backgroundColor:'#1565C0',stack:'pts'},
          {label:'Upset pts',data:dogData,backgroundColor:'#2E7D32',stack:'pts'},
          {label:'Cup pts',data:cupData,backgroundColor:'#B8860B',stack:'pts'},
          {label:'Potential',data:potData,backgroundColor:isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.08)',stack:'pts',borderWidth:0}
        ]
      },
      options:{
        indexAxis:'y',
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x} pts`}}},
        scales:{
          x:{stacked:true,grid:{color:gridColor},ticks:{color:textColor,font:{size:11}}},
          y:{stacked:true,grid:{display:false},ticks:{color:textColor,font:{size:11}}}
        }
      }
    });
  }

  // Line chart - cumulative by round
  const lineCtx=document.getElementById('line-chart');
  if(lineCtx&&activeRounds.length>0){
    const colors=['#1565C0','#2E7D32','#C62828','#B8860B','#7B3F9E','#0097A7','#E65100','#5D4037','#455A64','#E91E63','#33691E'];
    const roundLabels=['Start',...activeRounds.map(r=>ROUNDS[state.rounds.indexOf(r)])];
    const datasets=scored.map((p,i)=>({
      label:p.name,
      data:[0,...activeRounds.map(r=>{
        const ri=state.rounds.indexOf(r);
        let cum=0;
        for(let j=0;j<=ri;j++){
          const rd=p.byRound[j]||{fav:0,dog:0};
          cum+=rd.fav+rd.dog;
        }
        if(ri===3&&p.cupPts) cum+=p.cupPts;
        return cum;
      })],
      borderColor:colors[i%colors.length],
      backgroundColor:colors[i%colors.length]+(isDark?'40':'20'),
      borderWidth:2,
      pointRadius:4,
      pointHoverRadius:6,
      tension:0.3,
      fill:false
    }));
    new Chart(lineCtx,{
      type:'line',
      data:{labels:roundLabels,datasets},
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'right',labels:{color:textColor,font:{size:11},boxWidth:12,padding:8}},
          tooltip:{mode:'index',intersect:false}
        },
        scales:{
          x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:11}}},
          y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:11}},beginAtZero:true}
        }
      }
    });
  }
}

/* ── Render cup ── */
function renderCup(){
  const teams=getAllTeams();
  const cw=getCupWinner();
  const esc=s=>(s||'').replace(/'/g,"\\'");
  let html='';
  if(cw) html+=`<div class="info">Champion: <strong>${cw}</strong> — +${CUP_BONUS} pts awarded to correct picks.</div>`;
  else html+=`<div class="info">Cup picks lock once a champion is set. ${currentParticipant?'Click your pick below.':'Sign in to set your pick.'}</div>`;
  if(isAdmin){
    html+=`<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">Set cup champion (admin)</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;
    teams.forEach(t=>{html+=`<button class="cup-team-btn${cw===t?' correct':''}" onclick="setCupWinner('${esc(t)}')">${t}</button>`;});
    if(cw) html+=`<button class="cup-team-btn" onclick="setCupWinner(null)" style="color:var(--text3)">clear</button>`;
    html+=`</div></div>`;
  }
  html+=`<div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px">Participant picks</div><div class="cup-grid">`;
  state.participants.forEach(p=>{
    const pick=state.cupPicks[p]||null;
    const correct=cw&&pick===cw;
    const isMe=p===currentParticipant;
    const canEdit=(isAdmin||isMe)&&!cw;
    html+=`<div class="cup-card"${isMe?' style="border-color:var(--blue)"':''}><div class="cup-pname">${p}${correct?` <span class="badge gold">+${CUP_BONUS}</span>`:''}</div><div>`;
    teams.forEach(t=>{
      const sel=pick===t;
      html+=`<button class="cup-team-btn${sel?(correct?' correct':' sel'):''}" onclick="setCupPick('${esc(p)}','${esc(t)}')" ${!canEdit?'disabled':''}>${t}</button>`;
    });
    if(!pick&&isMe&&!cw) html+=`<div style="font-size:10px;color:var(--orange);margin-top:4px">No pick yet!</div>`;
    html+=`</div></div>`;
  });
  html+=`</div>`;
  document.getElementById('cup').innerHTML=html;
}

/* ── Render admin ── */
function renderAdmin(){
  if(!isAdmin){ document.getElementById('admin').innerHTML=`<div class="warn">Admin access required.</div>`; return; }
  const esc=s=>(s||'').replace(/'/g,"\\'");
  let html='';

  /* Pool title */
  html+=`<div class="setup-section"><div class="setup-label">Pool title</div>`;
  html+=`<div style="display:flex;gap:8px;align-items:center"><input type="text" id="pool-title-in" value="${state.title||''}" style="width:240px"><button class="btn primary" onclick="saveTitle()">Save</button></div></div>`;

  /* Participants */
  html+=`<div class="setup-section"><div class="setup-label">Participants &amp; PINs</div>`;
  html+=`<div class="info">Each participant's PIN is their name in lowercase with no spaces. Share it with them directly.</div>`;
  html+=`<table class="p-table"><thead><tr><th>Name</th><th>PIN</th><th></th></tr></thead><tbody>`;
  state.participants.forEach(p=>{
    html+=`<tr><td>${p}</td><td><span class="pin-display">${pinFor(p)}</span></td><td><button class="btn sm danger" onclick="removeParticipant('${esc(p)}')">Remove</button></td></tr>`;
  });
  html+=`</tbody></table>`;
  html+=`<div class="input-row" style="margin-top:10px"><input type="text" id="new-p" placeholder="Add participant..." style="width:180px" onkeydown="if(event.key==='Enter')addParticipant()"><button class="btn primary" onclick="addParticipant()">Add</button></div></div>`;

  /* Matchup management */
  html+=`<div class="setup-section"><div class="setup-label">Matchups &amp; lock times</div>`;
  html+=`<div class="info">Set the lock date/time for each series individually — picks freeze at that moment. Admin can still edit after lock. Leave blank for no lock (admin-only entry). Winner can be set any time.</div>`;

  for(let ri=0;ri<4;ri++){
    const r=state.rounds[ri];
    const maxSeries=[8,4,2,1][ri]||1;
    html+=`<div style="margin-bottom:20px">`;
    html+=`<div style="font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px">${ROUNDS[ri]}</div>`;
    html+=`<div class="setup-grid">`;
    for(let mi=0;mi<maxSeries;mi++){
      const m=r.matchups[mi]||{fav:'',favSeed:'',dog:'',dogSeed:'',winner:null,lockTime:null};
      const lockVal=m.lockTime?m.lockTime.slice(0,16):'';
      const status=lockStatus(m);
      html+=`<div class="setup-matchup"><div class="setup-matchup-title">Series ${mi+1}</div>`;
      if(ri>0){
        html+=`<div style="font-size:11px;margin-bottom:6px">`;
        if(m.winner) html+=`<span class="badge complete">&#10003; ${m.winner}</span>`;
        else if(status==='locked') html+=`<span class="badge locked">Locked</span>`;
        else if(m.lockTime) html+=`<span class="badge open">Open</span>`;
        else if(m.fav) html+=`<span class="badge open">No lock set</span>`;
        html+=`</div>`;
      }
      html+=`<div class="input-row"><span class="input-label">Fav</span><input type="number" class="seed-in" min="1" max="8" value="${m.favSeed||''}" placeholder="#" id="r${ri}s${mi}s1"><input type="text" class="team-in" value="${m.fav||''}" placeholder="Team" id="r${ri}s${mi}t1"></div>`;
      html+=`<div class="input-row"><span class="input-label">Dog</span><input type="number" class="seed-in" min="1" max="8" value="${m.dogSeed||''}" placeholder="#" id="r${ri}s${mi}s2"><input type="text" class="team-in" value="${m.dog||''}" placeholder="Team" id="r${ri}s${mi}t2"></div>`;
      html+=`<div class="input-row"><span class="input-label">Lock</span><input type="datetime-local" class="lock-in" value="${lockVal}" id="r${ri}s${mi}lock"></div>`;
      if(ri>0&&m.fav){
        html+=`<div class="input-row"><span class="input-label">Winner</span>`;
        html+=`<button class="btn sm${m.winner===m.fav?' primary':''}" onclick="toggleWinner(${ri},${mi},'${esc(m.fav)}')">${m.fav}</button>`;
        html+=`<button class="btn sm${m.winner===m.dog?' primary':''}" onclick="toggleWinner(${ri},${mi},'${esc(m.dog)}')">${m.dog}</button>`;
        if(m.winner) html+=`<button class="btn sm" onclick="toggleWinner(${ri},${mi},'${esc(m.winner)}')" style="color:var(--text3)">clear</button>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
    html+=`<button class="btn primary" onclick="saveRoundMatchups(${ri})">Save ${ROUNDS[ri]}</button>`;
    if(ri===0) html+=`<span style="font-size:11px;color:var(--text3);margin-left:8px">Saving Round 1 resets all later rounds and picks.</span>`;
    html+=`</div>`;
  }
  html+=`</div>`;

  /* Cup champion */
  const teams=getAllTeams();
  const cw=getCupWinner();
  html+=`<div class="setup-section"><div class="setup-label">Cup champion</div>`;
  html+=`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
  teams.forEach(t=>{html+=`<button class="btn sm${cw===t?' primary':''}" onclick="setCupWinner('${esc(t)}')">${t}</button>`;});
  if(cw) html+=`<button class="btn sm" onclick="setCupWinner(null)" style="color:var(--text3)">clear</button>`;
  html+=`</div></div>`;

  /* Share */
  html+=`<div class="setup-section"><div class="setup-label">Share</div>`;
  html+=`<div class="info">This URL always loads the latest data. Share it with everyone — no account needed to view picks and standings.<br><br><span style="word-break:break-all;font-size:11px">${location.href}</span></div>`;
  html+=`<button class="btn" onclick="copyUrl()">Copy URL</button><span id="copy-confirm" style="font-size:12px;color:var(--green);margin-left:8px"></span></div>`;

  /* Force sync */
  html+=`<div class="setup-section"><div class="setup-label">Data sync</div>`;
  html+=`<div class="info">If the live site is showing wrong data, use this to overwrite JSONBin with the data currently in this file. All picks and matchups will be replaced with what the code has.</div>`;
  html+=`<button class="btn primary" onclick="forceSyncToBin()">Push file data to cloud</button><span id="sync-confirm" style="font-size:12px;color:var(--green);margin-left:8px"></span></div>`;

  /* Danger */
  html+=`<div class="setup-section"><div class="setup-label" style="color:var(--red)">Danger zone</div>`;
  html+=`<button class="btn danger" onclick="resetPool()">Reset entire pool</button></div>`;

  document.getElementById('admin').innerHTML=html;
}

/* ── Admin actions ── */
function saveTitle(){
  const v=document.getElementById('pool-title-in')?.value.trim();
  if(v){state.title=v;saveToBin();updateHeader();}
}

function copyUrl(){
  navigator.clipboard.writeText(location.href).then(()=>{
    const el=document.getElementById('copy-confirm');
    if(el){el.textContent='Copied!';setTimeout(()=>el.textContent='',2500);}
  });
}

function addParticipant(){
  const inp=document.getElementById('new-p');
  const name=inp?.value.trim();
  if(!name||state.participants.includes(name)) return;
  state.participants.push(name);
  state.rounds.forEach(r=>{if(!r.picks[name])r.picks[name]=r.matchups.map(()=>null);});
  inp.value='';
  saveToBin(); render();
}

function removeParticipant(name){
  if(!confirm(`Remove ${name}? This deletes all their picks.`)) return;
  state.participants=state.participants.filter(p=>p!==name);
  state.rounds.forEach(r=>{delete r.picks[name];});
  delete state.cupPicks[name];
  saveToBin(); render();
}

function saveRoundMatchups(ri){
  const maxSeries=[8,4,2,1][ri]||1;
  const matchups=[];
  for(let mi=0;mi<maxSeries;mi++){
    const t1=document.getElementById(`r${ri}s${mi}t1`)?.value.trim();
    const t2=document.getElementById(`r${ri}s${mi}t2`)?.value.trim();
    const s1=parseInt(document.getElementById(`r${ri}s${mi}s1`)?.value)||0;
    const s2=parseInt(document.getElementById(`r${ri}s${mi}s2`)?.value)||0;
    const lock=document.getElementById(`r${ri}s${mi}lock`)?.value||null;
    if(!t1||!t2) continue;
    let fav=t1,favSeed=s1,dog=t2,dogSeed=s2;
    if(s2>0&&s2<s1){fav=t2;favSeed=s2;dog=t1;dogSeed=s1;}
    // preserve existing winner if teams match
    const ex=state.rounds[ri].matchups[matchups.length];
    const winner=(ex&&ex.fav===fav&&ex.dog===dog)?ex.winner:null;
    matchups.push({fav,favSeed,dog,dogSeed,winner,lockTime:lock||null});
  }
  if(ri===0){
    if(!confirm('Saving Round 1 matchups clears all picks and later rounds. Continue?')) return;
    state.rounds=[{matchups,picks:{}},{matchups:[],picks:{}},{matchups:[],picks:{}},{matchups:[],picks:{}}];
    state.cupPicks={};
    state.participants.forEach(p=>{state.rounds[0].picks[p]=matchups.map(()=>null);});
  } else {
    const existingPicks=state.rounds[ri].picks;
    state.rounds[ri].matchups=matchups;
    // preserve picks where participant arrays exist, extend if needed
    state.participants.forEach(p=>{
      if(!existingPicks[p]||existingPicks[p].length<matchups.length){
        existingPicks[p]=(existingPicks[p]||[]);
        while(existingPicks[p].length<matchups.length) existingPicks[p].push(null);
      }
    });
    state.rounds[ri].picks=existingPicks;
  }
  saveToBin(); render();
}

async function forceSyncToBin(){
  if(!confirm('This will overwrite the cloud data with the data baked into this file. All current picks and matchups will be replaced. Continue?')) return;
  setSyncStatus('saving');
  try{
    const res=await fetch(API_BASE,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY},
      body:JSON.stringify(state)
    });
    if(!res.ok) throw new Error();
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),2500);
    const el=document.getElementById('sync-confirm');
    if(el){el.textContent='Pushed successfully!';setTimeout(()=>el.textContent='',3000);}
  }catch(e){
    setSyncStatus('error');
    const el=document.getElementById('sync-confirm');
    if(el){el.textContent='Push failed — check console.';el.style.color='var(--red)';}
  }
}

function resetPool(){
  if(!confirm('This deletes ALL picks, results, matchups, and lock times. Are you sure?')) return;
  state.rounds=[{matchups:[],picks:{}},{matchups:[],picks:{}},{matchups:[],picks:{}},{matchups:[],picks:{}}];
  state.cupPicks={};
  saveToBin(); render();
}

/* ── Header ── */
function updateHeader(){
  document.getElementById('hdr-title').textContent=state.title||'NHL Playoff Pool';
  document.title=state.title||'NHL Playoff Pool';
  const ri=state.rounds.findIndex(r=>r.matchups.length>0&&!r.matchups.every(m=>m.winner));
  const cw=getCupWinner();
  document.getElementById('hdr-status').textContent=cw?'Champion crowned':ri>=0?ROUNDS[ri]+' in progress':'';
}

/* ── Tab nav ── */
function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['bracket','standings','cup','admin'][i]===id);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='admin') renderAdmin();
}

/* ── Full render ── */
function render(){
  renderBracket(); renderStandings(); renderCup();
  document.querySelectorAll('.admin-only').forEach(el=>el.style.display=isAdmin?'':'none');
  if(document.getElementById('admin').classList.contains('active')) renderAdmin();
}

/* ── Auto-refresh for viewers ── */
function startAutoRefresh(){
  setInterval(async()=>{
    if(isAdmin||currentParticipant) return;
    await loadFromBin(); render();
  },60000);
}

/* ── Boot ── */
(async()=>{
  await loadFromBin();
  render();
  startAutoRefresh();
})();
</script>
